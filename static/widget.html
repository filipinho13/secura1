<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Support Sécurité</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 16px; background: #0f172a; color: #e2e8f0; }
    .container { max-width: 420px; margin: 0 auto; background: #111827; border: 1px solid #374151; border-radius: 12px; overflow: hidden; }
    .header { background: #1f2937; padding: 12px 16px; font-weight: 600; }
    .messages { height: 380px; overflow-y: auto; padding: 12px; background: #0b1220; }
    .msg { padding: 8px 10px; border-radius: 10px; margin: 6px 0; max-width: 80%; }
    .in { background: #1f2937; align-self: flex-start; }
    .out { background: #2563eb; color: white; align-self: flex-end; margin-left: auto; }
    .composer { display: flex; gap: 8px; padding: 12px; background: #0b1220; border-top: 1px solid #374151; }
    input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; }
    button { padding: 10px 14px; border-radius: 10px; border: 0; background: #22c55e; color: #052e16; font-weight: 700; cursor: pointer; }
    .flex { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div class="container flex">
    <div class="header">Assistance sécurité (24/7)</div>
    <div id="messages" class="messages flex"></div>
    <div class="composer">
      <input id="input" placeholder="Votre message..." />
      <button id="send">Envoyer</button>
    </div>
  </div>
  <script>
    const sessionId = localStorage.getItem('sec_session') || crypto.randomUUID();
    localStorage.setItem('sec_session', sessionId);

    const apiBase = location.origin;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMsg(text, cls) {
      const el = document.createElement('div');
      el.className = `msg ${cls}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMsg(text, 'in');
      inputEl.value = '';
      try {
        const res = await fetch(`${apiBase}/api/chat/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, message: text })
        });
        const data = await res.json();
        addMsg(data.reply, 'out');
      } catch (e) {
        addMsg('Erreur réseau, réessayez.', 'out');
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

    addMsg("Bonjour, je suis votre assistant sécurité. Parlez-moi de vidéosurveillance, contrôle d'accès ou alarme.", 'out');
  </script>
</body>
</html>
