version: '3.8'

services:
  # Base de données MongoDB
  mongodb:
    image: mongo:7.0
    container_name: secura-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secura123
      MONGO_INITDB_DATABASE: secura_erp
    volumes:
      - ./mongodb-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - secura-network

  # Backend API Python FastAPI
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: secura-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://admin:secura123@mongodb:27017/secura_erp?authSource=admin
      DB_NAME: secura_erp
      SECRET_KEY: synology-secura-protect-2024-key-change-me
      ENVIRONMENT: production
    depends_on:
      - mongodb
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - secura-network

  # Frontend Nginx
  frontend:
    image: nginx:alpine
    container_name: secura-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - secura-network

networks:
  secura-network:
    driver: bridge

volumes:
  mongodb-data: